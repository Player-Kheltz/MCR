<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MCR Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; }
#sidebar { width: 50px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 4px; }
#sidebar button { width: 36px; height: 36px; border: none; border-radius: 8px; background: transparent; color: #8b949e; cursor: pointer; font-size: 18px; }
#sidebar button:hover { background: #21262d; color: #c9d1d9; }
#sidebar button.active { background: #1f6feb; color: #fff; }
#main { flex: 1; display: flex; }
#chat-panel { width: 340px; min-width: 260px; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
#chat-header { padding: 8px 12px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
#chat-msgs { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.msg { padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.4; max-width: 97%; }
.msg.user { background: #1f6feb22; border: 1px solid #1f6feb44; align-self: flex-end; color: #c9d1d9; }
.msg.bot { background: #21262d; border: 1px solid #30363d; align-self: flex-start; color: #8b949e; }
.msg .meta { font-size: 10px; color: #484f58; margin-top: 4px; }
#chat-input-wrap { display: flex; gap: 4px; padding: 6px; background: #161b22; border-top: 1px solid #30363d; }
#chat-input-wrap textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px; color: #c9d1d9; font-size: 13px; resize: none; height: 36px; outline: none; }
#chat-input-wrap textarea:focus { border-color: #1f6feb; }
#chat-input-wrap button { background: #1f6feb; color: #fff; border: none; border-radius: 6px; padding: 0 16px; font-size: 13px; cursor: pointer; }
#chat-input-wrap button:disabled { opacity: 0.5; cursor: default; }
#view-panel { flex: 1; display: flex; flex-direction: column; }
#view-header { padding: 8px 12px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; }
#view-body { flex: 1; overflow-y: auto; padding: 12px; font-family: 'Consolas', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word; color: #8b949e; }
#stats-bar { display: flex; gap: 16px; padding: 6px 12px; background: #161b22; border-top: 1px solid #30363d; font-size: 11px; color: #484f58; }
#stats-bar span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.green { background: #3fb950; }
.dot.gray { background: #484f58; }
</style>
</head>
<body>

<div id="sidebar">
  <button class="active" onclick="switchView('chat')" title="Chat">💬</button>
  <button onclick="switchView('stats')" title="Estatisticas">📊</button>
</div>

<div id="main">
  <div id="chat-panel">
    <div id="chat-header">Chat</div>
    <div id="chat-msgs"></div>
    <div id="chat-input-wrap">
      <textarea id="chat-input" rows="1" placeholder="Digite um comando..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar()}"></textarea>
      <button id="chat-btn" onclick="enviar()">Enviar</button>
    </div>
  </div>

  <div id="view-panel">
    <div id="view-header">Saida</div>
    <div id="view-body">MCR Agent pronto. Digite algo no chat.</div>
    <div id="stats-bar">
      <span><span class="dot green"></span> <span id="s-fonte">—</span></span>
      <span>⚡ <span id="s-tempo">—</span></span>
      <span>🎯 MCR: <span id="s-taxa">—</span></span>
      <span>🧠 Markov: <span id="s-estados">—</span></span>
    </div>
  </div>
</div>

<script>
const chatMsgs = document.getElementById('chat-msgs');
const viewBody = document.getElementById('view-body');
const chatInput = document.getElementById('chat-input');
const chatBtn = document.getElementById('chat-btn');

function addMsg(tipo, texto, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  div.innerHTML = texto;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  chatMsgs.appendChild(div);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

function updateStats(fonte, tempo, stats) {
  document.getElementById('s-fonte').textContent = fonte || '—';
  document.getElementById('s-tempo').textContent = tempo ? tempo + 's' : '—';
  if (stats) {
    document.getElementById('s-taxa').textContent = stats.taxa_acerto_mcr || '—';
    document.getElementById('s-estados').textContent = stats.estados_markov || '—';
  }
}

async function enviar() {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  addMsg('user', msg);
  viewBody.textContent = 'Processando...';
  chatBtn.disabled = true;
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: msg})
    });
    const data = await resp.json();
    const resposta = data.resposta || '(sem resposta)';
    const fonte = data.fonte || '?';
    const tempo = data.tempo || 0;
    addMsg('bot', resposta, `[${fonte}] ${tempo}s`);
    viewBody.textContent = resposta;
    updateStats(fonte, tempo, data.stats);
  } catch (e) {
    addMsg('bot', 'Erro: ' + e.message);
    viewBody.textContent = 'Erro: ' + e.message;
  }
  chatBtn.disabled = false;
  chatInput.focus();
}

function switchView(view) {
  document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (view === 'stats') {
    fetch('/api/mcr-stats').then(r => r.json()).then(d => {
      viewBody.textContent = JSON.stringify(d, null, 2);
    });
  }
}

// Carrega stats iniciais
fetch('/api/mcr-stats').then(r => r.json()).then(d => {
  document.getElementById('s-taxa').textContent = d.taxa_acerto_mcr || '—';
  document.getElementById('s-estados').textContent = d.estados_markov || '—';
});
</script>
</body>
</html>
