<!DOCTYPE html>
<html lang="pt-BR" data-theme="business">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MCR-DevIA — World Console</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="font-['-apple-system,Segoe_UI,sans-serif'] text-[13px] bg-base-100 text-base-content h-screen flex flex-col overflow-hidden">

<div id="topbar" x-data="topbarData()" x-init="init()" class="bg-base-200 border-b border-base-300 px-3 h-9 flex items-center gap-3 shrink-0">
  <div class="w-2 h-2 rounded-full shrink-0" :class="connected ? 'bg-success' : 'bg-error'"></div>
  <h1 class="text-primary text-[13px] font-semibold mr-auto">MCR-DevIA</h1>
  <div class="w-[60px] h-1 bg-base-300 rounded overflow-hidden"><div class="h-full rounded transition-all duration-1000" :style="'width:'+entropyPct+'%;background:'+entropyColor"></div></div>
  <span class="text-[10px] text-base-content/60 flex items-center gap-1"><i data-lucide="users" data-lucide-size="14"></i> <span class="font-semibold text-base-content" x-text="npcs">—</span></span>
  <span class="text-[10px] text-base-content/60 flex items-center gap-1"><i data-lucide="scroll-text" data-lucide-size="14"></i> <span class="font-semibold text-base-content" x-text="lores">—</span></span>
  <span class="text-[10px] text-base-content/60 flex items-center gap-1"><span class="font-semibold" :class="connected ? 'text-success' : 'text-base-content'" x-text="connected ? 'Conectado' : 'Offline'"></span></span>
  <select class="select select-xs select-ghost text-base-content/60 w-auto" x-model="theme" @change="setTheme">
    <option value="forest">Forest</option>
    <option value="light">Light</option>
    <option value="dark">Dark</option>
    <option value="dim">Dim</option>
    <option value="cupcake">Cupcake</option>
    <option value="retro">Retro</option>
    <option value="cyberpunk">Cyberpunk</option>
    <option value="synthwave">Synthwave</option>
    <option value="dracula">Dracula</option>
    <option value="night">Night</option>
    <option value="coffee">Coffee</option>
    <option value="winter">Winter</option>
    <option value="nord">Nord</option>
    <option value="luxury">Luxury</option>
    <option value="business">Business</option>
    <option value="acid">Acid</option>
    <option value="lemonade">Lemonade</option>
  </select>
</div>

<div id="main" class="flex-1 flex overflow-hidden">
  <div id="sidebar" class="w-11 bg-base-200 border-r border-base-300 flex flex-col items-center py-1 gap-0.5 shrink-0">
    <div class="tooltip tooltip-right" data-tip="Chat">
      <button class="btn btn-ghost btn-square btn-sm text-base-content/60" :class="currentView === 'chat' ? '!bg-primary !text-primary-content' : ''" data-view="chat" @click="switchView('chat')"><i data-lucide="message-square"></i></button>
    </div>
    <div class="tooltip tooltip-right" data-tip="Telemetria">
      <button class="btn btn-ghost btn-square btn-sm text-base-content/60" :class="currentView === 'telemetry' ? '!bg-primary !text-primary-content' : ''" data-view="telemetry" @click="switchView('telemetry')"><i data-lucide="bar-chart-3"></i></button>
    </div>
    <div class="tooltip tooltip-right" data-tip="NPCs">
      <button class="btn btn-ghost btn-square btn-sm text-base-content/60" :class="currentView === 'npcs' ? '!bg-primary !text-primary-content' : ''" data-view="npcs" @click="switchView('npcs')"><i data-lucide="users"></i></button>
    </div>
    <div class="tooltip tooltip-right" data-tip="Quests">
      <button class="btn btn-ghost btn-square btn-sm text-base-content/60" :class="currentView === 'quests' ? '!bg-primary !text-primary-content' : ''" data-view="quests" @click="switchView('quests')"><i data-lucide="scroll-text"></i></button>
    </div>
    <div class="tooltip tooltip-right" data-tip="Mapa">
      <button class="btn btn-ghost btn-square btn-sm text-base-content/60" :class="currentView === 'map' ? '!bg-primary !text-primary-content' : ''" data-view="map" @click="switchView('map')"><i data-lucide="map"></i></button>
    </div>
    <div class="flex-1"></div>
    <div class="tooltip tooltip-right" data-tip="Logs">
      <button class="btn btn-ghost btn-square btn-sm text-base-content/60" @click="toggleLog()"><i data-lucide="terminal"></i></button>
    </div>
  </div>
  <div id="content" class="flex-1 flex overflow-hidden">
    <div id="left-col" class="w-[320px] min-w-[260px] border-r border-base-300 flex flex-col overflow-hidden" x-data="chatData()" x-init="init()">
      <div id="chat-header" class="bg-base-200 px-2.5 py-1.5 border-b border-base-300 text-[10px] text-base-content/60 uppercase tracking-wide shrink-0 flex items-center gap-1"><i data-lucide="message-square" data-lucide-size="14"></i> Chat — digite um comando para o Guardião do Mundo</div>
      <div id="chat-msgs" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1">
        <template x-for="(m,i) in msgs" :key="i">
          <div class="p-2.5 px-3 rounded-md text-[12px] leading-relaxed max-w-[97%]" :class="{
            'bg-primary/10 border border-primary/20 self-end text-base-content': m.tipo === 'user',
            'bg-base-300 border self-start text-base-content/70 border-base-300': m.tipo === 'bot' && !m.streaming,
            'bg-base-300 border border-primary self-start text-base-content/70': m.tipo === 'bot' && m.streaming
          }">
            <span x-text="m.texto"></span><span x-show="m.streaming" class="inline-block w-1.5 h-3 bg-primary animate-pulse align-text-bottom ml-0.5"></span>
            <div x-show="m.meta" class="text-[9px] text-base-content/50 mt-1" x-text="m.meta"></div>
          </div>
        </template>
        <div x-show="!msgs.length" class="text-base-content/50 text-[11px] text-center p-5">
          MCR-DevIA Console. Digite algo para começar.
        </div>
      </div>
      <div id="chat-input-wrap" class="flex gap-1 p-1.5 bg-base-200 border-t border-base-300 shrink-0">
        <textarea x-model="input" @keydown="if($event.key==='Enter'&&!$event.shiftKey){$event.preventDefault();send()}" :disabled="busy" placeholder="Crie um NPC ferreiro élfico..." class="textarea textarea-bordered textarea-sm flex-1 bg-base-100 text-base-content focus:border-primary outline-none h-9 min-h-0 resize-none"></textarea>
        <button @click="send()" :disabled="busy || !input.trim()" class="btn btn-secondary btn-sm shrink-0">Enviar</button>
      </div>
    </div>
    <div id="right-col" class="flex-1 flex flex-col overflow-hidden">
      <div id="view-header" class="bg-base-200 px-2.5 py-1.5 border-b border-base-300 text-[10px] text-base-content/60 flex justify-between shrink-0">
        <span x-text="viewTitle">Saída</span>
        <span class="text-[9px] text-base-content/50" x-text="viewSub"></span>
      </div>
      <div id="view-body" class="flex-1 overflow-y-auto p-2.5 font-['Consolas'] text-[12px] whitespace-pre-wrap break-words text-base-content/70" x-html="viewContent"></div>
    </div>
  </div>
</div>

<div id="logbar" class="bg-base-200 border-t border-base-300 px-2 py-0.5 font-['Consolas'] text-[9px] text-base-content/50 h-[22px] flex items-center gap-1.5 shrink-0 overflow-hidden transition-all duration-150" x-data="logData()" x-init="init()">
  <i data-lucide="terminal" data-lucide-size="12" class="text-primary shrink-0"></i>
  <span class="truncate whitespace-nowrap overflow-hidden text-ellipsis" x-text="ultimoLog"></span>
</div>

<script>
// ─── SSE GLOBAL ──────────────────────────────────────
const sse = new EventSource('/stream');
window.SSE = sse;

// ─── TOPBAR ──────────────────────────────────────────
function topbarData() {
  return {
    connected: true, npcs: '—', lores: '—', currentView: 'chat',
    entropyPct: 50, entropyColor: '#22c55e',
    theme: localStorage.getItem('mcr-theme') || 'forest',
    init() {
      document.documentElement.setAttribute('data-theme', this.theme);
      sse.onopen = () => this.connected = true;
      sse.onerror = () => this.connected = false;
      const refresh = () => fetch('/api/world/status').then(r=>r.json()).then(d => {
        this.npcs = d.total_npcs || '—'; this.lores = d.total_lores || '—';
        const e = d.entropia || 0.5; this.entropyPct = e * 100;
        this.entropyColor = e > 0.7 ? '#ef4444' : e > 0.4 ? '#eab308' : '#22c55e';
      }).catch(()=>{});
      refresh(); setInterval(refresh, 10000);
    },
    switchView(v) {
      this.currentView = v;
      window.dispatchEvent(new CustomEvent('view-change', {detail: v}));
    },
    setTheme() {
      document.documentElement.setAttribute('data-theme', this.theme);
      localStorage.setItem('mcr-theme', this.theme);
    },
    toggleLog() {
      const bar = document.getElementById('logbar');
      bar.style.height = bar.style.height === '120px' ? '22px' : '120px';
      bar.style.overflowY = bar.style.height === '120px' ? 'auto' : 'hidden';
    }
  };
}

// ─── CHAT ────────────────────────────────────────────
function chatData() {
  return {
    input: '', msgs: [], busy: false, streaming: false, acumulado: '',
    viewTitle: 'Saída', viewSub: '', viewContent: '<span style="color:#6b7280">Saídas aparecerão aqui.</span>',
    init() {
      window.addEventListener('view-change', e => this.onViewChange(e.detail));
    },
    onViewChange(view) {
      // Views handled by Alpine elsewhere
    },
    async send() {
      const _this = this;
      const msg = _this.input.trim(); if (!msg) return;
      _this.input = ''; _this.busy = true; _this.streaming = true; _this.acumulado = '';
      _this.msgs.push({tipo: 'user', texto: msg});
      _this.viewContent = 'Aguardando resposta do LLM...';
      _this.viewSub = 'streaming';
      const botIdx = _this.msgs.length;
      _this.msgs.push({tipo: 'bot', texto: '', streaming: true});

      try {
        const resp = await fetch('/api/chat-stream', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({prompt: msg})
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let prevLines = [];

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, {stream: true});
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.startsWith('event: ')) {
              const event = line.slice(7).trim();
              const dataLine = (i + 1 < lines.length) ? lines[i + 1] : '';
              if (dataLine.startsWith('data: ')) {
                try {
                  const data = JSON.parse(dataLine.slice(6));
                  _this.handleEvent(event, data, botIdx);
                } catch(e) { /* json parse ignorado */ }
              }
            }
          }
        }
      } catch(e) {
        if (_this.msgs[botIdx]) {
          _this.msgs[botIdx].texto = `Erro: ${e.message}`;
          _this.msgs[botIdx].streaming = false;
        }
        _this.viewContent = `Erro: ${e.message}`;
      }

      _this.busy = false;
      _this.streaming = false;
      _this.viewSub = '';
      if (_this.msgs[botIdx]) _this.msgs[botIdx].streaming = false;

      setTimeout(() => {
        const el = document.querySelector('#chat-input-wrap textarea');
        if (el) el.focus();
      }, 50);
    },
    handleEvent(event, data, idx) {
      if (event === 'chat_token') {
        this.acumulado = data.acumulado || '';
        if (this.msgs[idx]) this.msgs[idx].texto = this.acumulado;
        this.viewContent = this.acumulado;
        const el = document.getElementById('chat-msgs');
        if (el) el.scrollTop = el.scrollHeight;
      } else if (event === 'chat_done') {
        if (this.msgs[idx]) {
          this.msgs[idx].streaming = false;
          this.msgs[idx].meta = `${data.rota} (${data.tempo}s)`;
        }
        this.viewSub = `${data.rota} ${data.tempo}s`;
        window.dispatchEvent(new CustomEvent('log-entry', {detail: `[chat] ${data.rota} (${data.tempo}s)`}));
      } else if (event === 'chat_error') {
        if (this.msgs[idx]) {
          this.msgs[idx].texto = `Erro: ${data.erro}`;
          this.msgs[idx].streaming = false;
        }
        this.viewContent = `Erro: ${data.erro}`;
      }
    }
  };
}

// ─── LOG BAR ─────────────────────────────────────────
function logData() {
  return {
    ultimoLog: '',
    init() {
      window.addEventListener('log-entry', e => this.ultimoLog = e.detail);
      sse.addEventListener('chat_start', e => {
        const d = JSON.parse(e.data);
        window.dispatchEvent(new CustomEvent('log-entry', {detail: `[chat] ${(d.prompt||'').slice(0,40)}...`}));
      });
    }
  };
}
</script>
<script>lucide.createIcons()</script>
</body>
</html>
